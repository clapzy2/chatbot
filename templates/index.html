<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Философский чат-бот</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #4a3f6b;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
        }
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .bot-message {
            justify-content: flex-start;
        }
        .message-content {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        .user-message .message-content {
            background: #4a3f6b;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bot-message .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sources {
            font-size: 12px;
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid #ddd;
            color: #666;
        }
        .file-badge {
            display: inline-block;
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 5px;
            margin-bottom: 3px;
            color: #333;
        }
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
        }
        .file-selector {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .file-selector label {
            font-weight: bold;
            color: #4a3f6b;
        }
        select {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
        }
        select:focus {
            border-color: #4a3f6b;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #4a3f6b;
        }
        button {
            padding: 12px 30px;
            background: #4a3f6b;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5f4f8a;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .thinking {
            text-align: center;
            padding: 10px;
            color: #666;
            font-style: italic;
        }
        .fragments {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 13px;
            color: #555;
            border-left: 3px solid #4a3f6b;
        }
        .fragments summary {
            cursor: pointer;
            color: #4a3f6b;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📜 Философский чат-бот</h1>
            <p>Отвечаю только по загруженным текстам</p>
            <div class="stats" id="stats">
                <span>📚 Загрузка списка файлов...</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message bot-message">
                <div class="message-content">
                    Здравствуйте! Я бот, который отвечает на вопросы только по загруженным текстам.
                    Выберите файл в списке ниже и задавайте вопросы.
                    <div class="sources">📁 Доступные файлы загружаются...</div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="file-selector">
                <label for="fileSelect">📁 Файл:</label>
                <select id="fileSelect">
                    <option value="all">Все файлы</option>
                </select>
            </div>
            <div class="input-row">
                <input type="text" id="questionInput" placeholder="Введите ваш вопрос..." onkeypress="if(event.key==='Enter') sendQuestion()">
                <button onclick="sendQuestion()" id="sendButton">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ЭЛЕМЕНТЫ ==========
        const chatContainer = document.getElementById('chatContainer');
        const questionInput = document.getElementById('questionInput');
        const sendButton = document.getElementById('sendButton');
        const fileSelect = document.getElementById('fileSelect');
        const statsDiv = document.getElementById('stats');

        // ========== ИСТОРИЯ ЗАПРОСОВ ==========
        let history = JSON.parse(localStorage.getItem('chatHistory') || '[]');

        function saveToHistory(question, answer) {
            history.push({
                question: question,
                answer: answer,
                timestamp: new Date().toLocaleString()
            });
            if (history.length > 50) history.shift();
            localStorage.setItem('chatHistory', JSON.stringify(history));
        }

        function showHistory() {
            if (history.length === 0) {
                alert('📭 История пуста. Задайте несколько вопросов!');
                return;
            }
            let text = '📜 ИСТОРИЯ ЗАПРОСОВ (последние 50):\n\n';
            history.forEach((item, i) => {
                text += `${i+1}. [${item.timestamp}]\n`;
                text += `В: ${item.question}\n`;
                text += `О: ${item.answer}\n`;
                text += `────────────────────────────────────────\n\n`;
            });
            alert(text);
        }

        function clearHistory() {
            if (confirm('Удалить всю историю запросов?')) {
                history = [];
                localStorage.removeItem('chatHistory');
                alert('✅ История очищена');
            }
        }

        // ========== ЗАГРУЗКА СПИСКА ФАЙЛОВ ==========
        async function loadFiles() {
            try {
                const response = await fetch('/files');
                const files = await response.json();

                while (fileSelect.options.length > 1) {
                    fileSelect.remove(1);
                }

                files.forEach(file => {
                    const option = document.createElement('option');
                    option.value = file;
                    option.textContent = file;
                    fileSelect.appendChild(option);
                });

                statsDiv.innerHTML = `<span>📚 Доступно файлов: ${files.length}</span>`;

                const firstMessage = document.querySelector('.bot-message .message-content');
                if (firstMessage && files.length > 0) {
                    firstMessage.innerHTML = `Здравствуйте! Я бот, который отвечает на вопросы только по загруженным текстам.
                    Выберите файл в списке ниже и задавайте вопросы.
                    <div class="sources">📁 Доступные файлы: ${files.join(', ')}</div>`;
                }

            } catch (error) {
                console.error('Ошибка загрузки файлов:', error);
                statsDiv.innerHTML = '<span>❌ Ошибка загрузки файлов</span>';
            }
        }

        // ========== ДОБАВЛЕНИЕ СООБЩЕНИЯ ==========
        function addMessage(text, isUser = false, sources = [], fragments = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;

            let contentHTML = `<div class="message-content">${text.replace(/\n/g, '<br>')}`;

            if (!isUser) {
                if (sources && sources.length > 0) {
                    contentHTML += `<div class="sources"><strong>📚 Файлы:</strong> `;
                    sources.forEach(s => {
                        contentHTML += `<span class="file-badge">${s}</span>`;
                    });
                    contentHTML += `</div>`;
                }

                if (fragments && fragments.length > 0) {
                    contentHTML += `<details class="fragments"><summary>🔍 Показать найденные фрагменты (${fragments.length})</summary>`;
                    fragments.forEach((f, i) => {
                        contentHTML += `<div style="margin-top: 8px;"><strong>Фрагмент ${i+1}:</strong> ${f}</div>`;
                    });
                    contentHTML += `</details>`;
                }
            }

            contentHTML += `</div>`;
            messageDiv.innerHTML = contentHTML;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addThinking() {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message bot-message';
            thinkingDiv.id = 'thinking';
            thinkingDiv.innerHTML = '<div class="message-content thinking">⚡ Думаю...</div>';
            chatContainer.appendChild(thinkingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeThinking() {
            const thinking = document.getElementById('thinking');
            if (thinking) thinking.remove();
        }

        // ========== ОТПРАВКА ВОПРОСА ==========
        async function sendQuestion() {
            const question = questionInput.value.trim();
            const selectedFile = fileSelect.value;

            if (!question) return;

            questionInput.disabled = true;
            sendButton.disabled = true;

            addMessage(question, true);
            questionInput.value = '';
            addThinking();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: question, file: selectedFile })
                });

                const data = await response.json();
                removeThinking();

                if (data.error) {
                    addMessage(`❌ Ошибка: ${data.error}`, false);
                } else {
                    addMessage(data.answer, false, data.sources, data.fragments);
                    saveToHistory(question, data.answer);
                }

            } catch (error) {
                removeThinking();
                addMessage(`❌ Ошибка соединения: ${error.message}`, false);
                console.error('Fetch error:', error);
            } finally {
                questionInput.disabled = false;
                sendButton.disabled = false;
                questionInput.focus();
            }
        }

        // ========== ДОБАВЛЯЕМ КНОПКИ ИСТОРИИ ==========
        const inputRow = document.querySelector('.input-row');
        if (inputRow) {
            const historyBtn = document.createElement('button');
            historyBtn.textContent = '📜 История';
            historyBtn.onclick = showHistory;
            historyBtn.style.marginLeft = '10px';
            historyBtn.style.background = '#5f4f8a';

            const clearBtn = document.createElement('button');
            clearBtn.textContent = '🗑️ Очистить';
            clearBtn.onclick = clearHistory;
            clearBtn.style.marginLeft = '10px';
            clearBtn.style.background = '#8b5f6b';

            inputRow.appendChild(historyBtn);
            inputRow.appendChild(clearBtn);
        }

        // ========== ЗАПУСК ==========
        loadFiles();
    </script>
</body>
</html>
