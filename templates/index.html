<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextBot</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0e0e10;
    --surface:  #17171a;
    --border:   #2a2a30;
    --accent:   #4ade80;
    --accent2:  #22c55e;
    --muted:    #52525b;
    --text:     #e4e4e7;
    --text-dim: #a1a1aa;
    --danger:   #f87171;
    --warn:     #fbbf24;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text-dim); }

  .file-select-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-select-wrap label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    max-width: 200px;
  }
  select:focus { border-color: var(--accent); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Chat ── */
  .chat-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .msg.user .msg-label { color: var(--accent); }

  .msg-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    line-height: 1.65;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-body {
    background: transparent;
    border-color: #2a2a30;
    color: var(--text-dim);
  }

  /* verified badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-top: 6px;
    width: fit-content;
  }
  .badge.ok  { background: rgba(74,222,128,.12); color: var(--accent); border: 1px solid rgba(74,222,128,.25); }
  .badge.no  { background: rgba(248,113,113,.10); color: var(--danger); border: 1px solid rgba(248,113,113,.2); }
  .badge.none{ background: rgba(251,191,36,.10);  color: var(--warn);   border: 1px solid rgba(251,191,36,.2); }

  /* ── Input ── */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    background: var(--surface);
  }
  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 44px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color .15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  button#send {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 0 18px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, opacity .15s;
    flex-shrink: 0;
    align-self: flex-end;
    height: 44px;
  }
  button#send:hover   { background: var(--accent2); }
  button#send:disabled{ opacity: .4; cursor: not-allowed; }

  /* ── Sidebar ── */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--surface);
  }
  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sidebar-body::-webkit-scrollbar { width: 3px; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); }

  .empty-sidebar {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    margin-top: 32px;
    font-family: var(--mono);
    line-height: 1.8;
  }

  .fragment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    animation: fadeUp .2s ease;
  }
  .fragment-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-family: var(--mono);
    font-size: 10px;
  }
  .fragment-file { color: var(--accent); }
  .fragment-score { color: var(--muted); }
  .fragment-text { white-space: pre-wrap; word-break: break-word; }

  /* ── Typing indicator ── */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink {
    0%,80%,100% { opacity: .2; transform: scale(.8); }
    40%         { opacity: 1;  transform: scale(1); }
  }

  /* ── Scrollbar general ── */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<header>
  <div class="logo">text<span>bot</span></div>
  <div class="file-select-wrap">
    <label>Файл</label>
    <select id="fileSelect">
      <option value="all">Все файлы</option>
    </select>
  </div>
</header>

<div class="layout">

  <!-- Chat -->
  <div class="chat-col">
    <div class="messages" id="messages">
      <div class="msg">
        <div class="msg-label">система</div>
        <div class="msg-body" style="color:var(--muted); font-size:13px;">
          Загрузите документы в папку <code style="color:var(--accent);font-family:var(--mono)">docs/</code>, запустите <code style="color:var(--accent);font-family:var(--mono)">ingest.py</code> — и задавайте вопросы.
        </div>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="input" placeholder="Задайте вопрос по тексту..." rows="1"></textarea>
      <button id="send">Отправить</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">Фрагменты источника</div>
    <div class="sidebar-body" id="sidebar">
      <div class="empty-sidebar">Здесь появятся<br>найденные фрагменты</div>
    </div>
  </div>

</div>

<script>
const messagesEl  = document.getElementById("messages");
const inputEl     = document.getElementById("input");
const sendBtn     = document.getElementById("send");
const sidebarEl   = document.getElementById("sidebar");
const fileSelect  = document.getElementById("fileSelect");

// Авторазмер textarea
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});

// Enter = отправить, Shift+Enter = перенос
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener("click", sendMessage);

// Загрузка файлов
fetch("/files").then(r => r.json()).then(files => {
  files.forEach(f => {
    const o = document.createElement("option");
    o.value = f; o.textContent = f;
    fileSelect.appendChild(o);
  });
});

function addMsg(role, content, verified = null) {
  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "вы" : "бот";

  const body = document.createElement("div");
  body.className = "msg-body";
  body.textContent = content;

  wrap.appendChild(label);
  wrap.appendChild(body);

  if (role === "bot" && verified !== null) {
    const badge = document.createElement("div");
    if (content === "НЕТ ИНФОРМАЦИИ") {
      badge.className = "badge none";
      badge.textContent = "⚠ нет в текстах";
    } else if (verified) {
      badge.className = "badge ok";
      badge.textContent = "✓ подтверждено";
    } else {
      badge.className = "badge no";
      badge.textContent = "✗ не подтверждено";
    }
    wrap.appendChild(badge);
  }

  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function addTyping() {
  const wrap = document.createElement("div");
  wrap.className = "msg bot";
  wrap.id = "typing";

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = "бот";

  const body = document.createElement("div");
  body.className = "msg-body";
  body.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  wrap.appendChild(label);
  wrap.appendChild(body);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function showFragments(fragments) {
  sidebarEl.innerHTML = "";
  if (!fragments || fragments.length === 0) {
    sidebarEl.innerHTML = '<div class="empty-sidebar">Фрагменты<br>не найдены</div>';
    return;
  }
  fragments.forEach(fr => {
    const card = document.createElement("div");
    card.className = "fragment-card";

    const meta = document.createElement("div");
    meta.className = "fragment-meta";
    meta.innerHTML = `
      <span class="fragment-file">${fr.file || "?"}</span>
      <span class="fragment-score">score: ${fr.score ?? "—"}</span>
    `;

    const text = document.createElement("div");
    text.className = "fragment-text";
    text.textContent = fr.text;

    card.appendChild(meta);
    card.appendChild(text);
    sidebarEl.appendChild(card);
  });
}

async function sendMessage() {
  const query = inputEl.value.trim();
  if (!query) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;

  addMsg("user", query);
  const typingEl = addTyping();

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, file: fileSelect.value })
    });
    const data = await res.json();
    typingEl.remove();

    if (data.error) {
      addMsg("bot", `Ошибка: ${data.error}`, false);
      showFragments([]);
    } else {
      addMsg("bot", data.answer, data.verified);
      showFragments(data.fragments || []);
    }
  } catch (e) {
    typingEl.remove();
    addMsg("bot", `Сетевая ошибка: ${e.message}`, false);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
